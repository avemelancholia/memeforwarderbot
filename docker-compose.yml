version: "3.8"

services:
    forwarder_bot:
        build: .
        init: true
        environment: 
          http_proxy: http://inna_vpnproxy:3128
          https_proxy: http://inna_vpnproxy:3128
        volumes:
          - type: bind
            source: db
            target: /app/db 
        restart: unless-stopped
        stop_grace_period: 30s
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "3"
        healthcheck:
          test: ["CMD", "python", "supervisor.py", "--healthcheck"]
          interval: 15s
          timeout: 3s
          retries: 2
          start_period: 90s
        networks:
          - net_vpnproxy
networks:
  net_vpnproxy:
    name: inna_net_vpnproxy
    external: true
